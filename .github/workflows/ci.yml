name: CI — Build & Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Normalize image name to lowercase
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"

      - name: Set up QEMU (multi-platform support)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: ${{ env.IMAGE_NAME }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Docker image (arm64, build-only)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:ci
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## 🔍 CI — Build & Security Scan"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Image** | \`${{ env.IMAGE_NAME }}:ci\` |"
            echo "| **Platforms built** | \`linux/amd64\` (loaded), \`linux/arm64\` (build-only) |"
            echo "| **Security scan** | Trivy SARIF uploaded to Security tab |"
          } >> "$GITHUB_STEP_SUMMARY"
